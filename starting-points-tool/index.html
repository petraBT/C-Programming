<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting Points</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: #222;
      }
      #app { max-width: 960px; margin: 0 auto; }
      h1 { font-size: 22px; margin-bottom: 4px; }
      h2 { font-size: 15px; margin: 0 0 10px 0; }
      h3 { font-size: 14px; margin: 22px 0 6px 0; color: #444; }
      .subtitle { color: #666; margin-top: 0; margin-bottom: 20px; }

      #tabs { display: flex; gap: 8px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
      #tabs button {
        font-size: 14px;
        font-weight: 600;
        padding: 10px 16px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: #888;
        cursor: pointer;
      }
      #tabs button.active { color: #2b6cb0; border-bottom-color: #2b6cb0; }

      .panel { display: none; }
      .panel.active { display: block; }

      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #444;
        margin-bottom: 6px;
        margin-top: 16px;
      }
      .hint { font-weight: 400; color: #888; }
      input[type="text"], select {
        width: 100%;
        font-family: inherit;
        font-size: 14px;
        padding: 8px 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      textarea {
        width: 100%;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 13px;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        resize: vertical;
      }
      #canvas-filter-input, #book-filter-input { margin-top: 0; }
      #origin-input { margin-top: 0; }

      .sp-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 0;
        border-bottom: 1px solid #f3f3f3;
        font-size: 13px;
      }
      .sp-row .sp-name { font-family: "SFMono-Regular", Consolas, monospace; flex: 1; }
      .sp-row button {
        font-size: 12px;
        color: #555;
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 4px 9px;
        cursor: pointer;
        white-space: nowrap;
      }
      .sp-row button:hover { background: #e6e6e6; }
      /* The row a ?file=... link landed on, so it's obvious which one of these
         the link meant. */
      .sp-row.sp-linked { background: #fff8dd; box-shadow: inset 3px 0 0 #e0b400; }
      .sp-detail {
        display: none;
        margin: 6px 0 12px 0;
        padding: 12px;
        background: #f7f7f7;
        border-radius: 4px;
      }
      .sp-detail.open { display: block; }
      .sp-detail textarea.edit-code {
        height: 220px;
        margin-bottom: 8px;
      }
      .sp-detail .edit-row { display: flex; align-items: center; gap: 10px; }
      .sp-detail .edit-status { font-size: 12px; }
      .sp-detail .edit-status.error { color: #b3413a; }
      .sp-detail .edit-status.success { color: #2f7a3d; }
      button.secondary {
        background: transparent;
      }

      .scope-toggle { display: flex; gap: 16px; margin-top: 16px; }
      .scope-toggle label { display: flex; align-items: center; gap: 6px; font-weight: 400; margin: 0; }

      #category-new-row { display: none; margin-top: 10px; }

      button.primary {
        margin-top: 20px;
        font-size: 15px;
        font-weight: 600;
        padding: 10px 24px;
        background: #2b6cb0;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button.primary:hover { background: #24578f; }

      #create-status { margin-top: 14px; font-size: 13px; }
      #create-status.error { color: #b3413a; }
      #create-status.success { color: #2f7a3d; }

      .embed-output {
        margin-top: 16px;
        border-top: 1px solid #eee;
        padding-top: 16px;
      }
      .embed-output h4 { font-size: 13px; margin: 14px 0 4px 0; }
      .embed-output .desc { font-size: 12px; color: #888; margin: 0 0 6px 0; }
      .embed-output textarea { height: 90px; background: #f7f7f7; }
      .embed-output .copy-row { display: flex; align-items: center; gap: 10px; }
      .embed-output .copy-row label { margin: 0; flex: 1; }
      button.copy-btn {
        font-size: 12px;
        color: #555;
        background: #f0f0f0;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 5px 10px;
        cursor: pointer;
        white-space: nowrap;
      }
      button.copy-btn.copied { background: #dff0d8; border-color: #b7dfb0; color: #3c763d; }
      .note { font-size: 12px; color: #999; margin-top: 4px; }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Starting Points</h1>
      <p class="subtitle">Browse everything in <code>CMeCodeDir/</code> (book) and <code>CanvasStartDir/</code> (Canvas short assignments, quizzes, tests), create new ones, and generate Canvas embed HTML.</p>

      <label for="origin-input">Deployed site origin <span class="hint">(used to build embed URLs - files must be committed + deployed to actually work there)</span></label>
      <input type="text" id="origin-input" value="https://cprog-client-preview.pages.dev" />

      <div id="tabs">
        <button id="tab-canvas-btn" class="active" type="button">Canvas</button>
        <button id="tab-book-btn" type="button">Book</button>
        <button id="tab-create-btn" type="button">Create New</button>
      </div>

      <div id="panel-canvas" class="panel active">
        <label for="canvas-filter-input">Filter</label>
        <input type="text" id="canvas-filter-input" placeholder="Filter by name..." />
        <div id="canvas-list"></div>
      </div>

      <div id="panel-book" class="panel">
        <label for="book-filter-input">Filter</label>
        <input type="text" id="book-filter-input" placeholder="Filter by name..." />
        <div id="book-list"></div>
      </div>

      <div id="panel-create" class="panel">
        <div class="scope-toggle">
          <label><input type="radio" name="scope" value="book" checked /> Book (CMeCodeDir)</label>
          <label><input type="radio" name="scope" value="canvas" /> Canvas (CanvasStartDir)</label>
        </div>

        <div id="category-row" style="display:none;">
          <label for="category-select">Category <span class="hint">(e.g. Short Assignment, Canvas Quiz, Test - whatever categories already exist, plus any new one you type)</span></label>
          <select id="category-select"></select>
          <div id="category-new-row">
            <input type="text" id="category-new-input" placeholder="e.g. Short Assignment" />
          </div>
        </div>

        <label for="name-input">Name <span class="hint">(becomes the filename, and for book mode the startPoint value)</span></label>
        <input type="text" id="name-input" placeholder="e.g. engs20p_NquizArrays1" />

        <label for="code-input">Starting C code</label>
        <textarea id="code-input" spellcheck="false" style="height:220px;">#include &lt;stdio.h&gt;

int main(void) {
    printf("Hello, world!\n");
    return 0;
}
</textarea>

        <button class="primary" id="save-btn" type="button">Save</button>
        <div id="create-status"></div>
        <div id="create-embed-output"></div>
      </div>
    </div>

    <script>
      // Categories always offered even if nothing's been saved under them yet -
      // merged with whatever category folders already exist on disk.
      const SUGGESTED_CATEGORIES = ['Short Assignment', 'Canvas Quiz', 'Test']

      let data = {book: [], canvas: {}}

      async function loadData() {
        const res = await fetch('/api/starting-points')
        data = await res.json()
        renderCanvas()
        renderBook()
        renderCategoryOptions()
      }

      // --- tabs ----------------------------------------------------------

      const tabCanvasBtn = document.getElementById('tab-canvas-btn')
      const tabBookBtn = document.getElementById('tab-book-btn')
      const tabCreateBtn = document.getElementById('tab-create-btn')
      const panelCanvas = document.getElementById('panel-canvas')
      const panelBook = document.getElementById('panel-book')
      const panelCreate = document.getElementById('panel-create')

      tabCanvasBtn.addEventListener('click', () => switchTab('canvas'))
      tabBookBtn.addEventListener('click', () => switchTab('book'))
      tabCreateBtn.addEventListener('click', () => switchTab('create'))

      function switchTab(name) {
        tabCanvasBtn.classList.toggle('active', name === 'canvas')
        tabBookBtn.classList.toggle('active', name === 'book')
        tabCreateBtn.classList.toggle('active', name === 'create')
        panelCanvas.classList.toggle('active', name === 'canvas')
        panelBook.classList.toggle('active', name === 'book')
        panelCreate.classList.toggle('active', name === 'create')
      }

      // --- browse: canvas ----------------------------------------------------

      const canvasListEl = document.getElementById('canvas-list')
      const canvasFilterInput = document.getElementById('canvas-filter-input')
      canvasFilterInput.addEventListener('input', renderCanvas)

      function renderCanvas() {
        const filter = canvasFilterInput.value.trim().toLowerCase()
        canvasListEl.innerHTML = ''

        // Grouped by category folder.
        const canvasEntries = Object.entries(data.canvas)
          .map(([category, items]) => [category, items.filter(sp => !filter || sp.name.toLowerCase().includes(filter))])
          .filter(([, items]) => items.length > 0)

        for (const [category, items] of canvasEntries.sort()) {
          appendGroup(canvasListEl, category, items)
        }

        if (canvasEntries.length === 0) {
          const p = document.createElement('p')
          p.className = 'note'
          p.textContent = filter ? 'No starting points match that filter.' : 'No starting points found.'
          canvasListEl.appendChild(p)
        }
      }

      // --- browse: book --------------------------------------------------

      const bookListEl = document.getElementById('book-list')
      const bookFilterInput = document.getElementById('book-filter-input')
      bookFilterInput.addEventListener('input', renderBook)

      function renderBook() {
        const filter = bookFilterInput.value.trim().toLowerCase()
        bookListEl.innerHTML = ''

        // Grouped by the first chapter that references it (or "Unreferenced").
        const bookGroups = {}
        for (const sp of data.book) {
          if (filter && !sp.name.toLowerCase().includes(filter)) continue
          const ref = sp.referencedBy[0]
          const label = ref ? (ref.title || ref.file) : 'Unreferenced'
          if (!bookGroups[label]) bookGroups[label] = []
          bookGroups[label].push(sp)
        }

        for (const [label, items] of Object.entries(bookGroups).sort()) {
          appendGroup(bookListEl, label, items)
        }

        if (Object.keys(bookGroups).length === 0) {
          const p = document.createElement('p')
          p.className = 'note'
          p.textContent = filter ? 'No starting points match that filter.' : 'No starting points found.'
          bookListEl.appendChild(p)
        }
      }

      function appendGroup(containerEl, label, items) {
        const h3 = document.createElement('h3')
        h3.textContent = label
        containerEl.appendChild(h3)
        for (const sp of items) {
          containerEl.appendChild(buildRow(sp))
        }
      }

      function buildRow(sp) {
        const row = document.createElement('div')
        row.className = 'sp-row'
        // Lets revealStartingPoint() find this row after a render, which is how
        // a ?file=... deep link opens the right editor.
        row.dataset.spName = sp.name

        const nameEl = document.createElement('span')
        nameEl.className = 'sp-name'
        nameEl.textContent = sp.name
        row.appendChild(nameEl)

        const editBtn = document.createElement('button')
        editBtn.type = 'button'
        editBtn.textContent = 'Edit'
        editBtn.dataset.role = 'edit'
        row.appendChild(editBtn)

        const embedBtn = document.createElement('button')
        embedBtn.type = 'button'
        embedBtn.textContent = 'Generate Embed HTML'
        row.appendChild(embedBtn)

        const detail = document.createElement('div')
        detail.className = 'sp-detail'

        const codeArea = document.createElement('textarea')
        codeArea.className = 'edit-code'
        codeArea.spellcheck = false
        detail.appendChild(codeArea)

        const editRow = document.createElement('div')
        editRow.className = 'edit-row'
        const saveBtn = document.createElement('button')
        saveBtn.type = 'button'
        saveBtn.textContent = 'Save changes'
        editRow.appendChild(saveBtn)
        const closeBtn = document.createElement('button')
        closeBtn.type = 'button'
        closeBtn.className = 'secondary'
        closeBtn.textContent = 'Close'
        editRow.appendChild(closeBtn)
        const editStatus = document.createElement('span')
        editStatus.className = 'edit-status'
        editRow.appendChild(editStatus)
        detail.appendChild(editRow)

        const embedContainer = document.createElement('div')
        detail.appendChild(embedContainer)

        let loaded = false
        let lastSavedContent = ''

        editBtn.addEventListener('click', async () => {
          const open = detail.classList.toggle('open')
          if (open && !loaded) {
            const res = await fetch(`/api/file?path=${encodeURIComponent(sp.path)}`)
            const json = await res.json()
            lastSavedContent = json.content || ''
            codeArea.value = lastSavedContent
            if (json.error) { editStatus.textContent = json.error; editStatus.className = 'edit-status error' }
            loaded = true
          }
        })

        // Just looking, not saving anything: reverts any typed-but-unsaved
        // edits back to what's actually on disk and closes, rather than
        // leaving stray changes sitting in the textarea if it's reopened.
        closeBtn.addEventListener('click', () => {
          codeArea.value = lastSavedContent
          editStatus.textContent = ''
          editStatus.className = 'edit-status'
          detail.classList.remove('open')
        })

        saveBtn.addEventListener('click', async () => {
          editStatus.textContent = ''
          editStatus.className = 'edit-status'
          try {
            const res = await fetch('/api/file', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({path: sp.path, code: codeArea.value}),
            })
            const json = await res.json()
            if (!res.ok) throw new Error(json.error || 'Save failed')
            lastSavedContent = codeArea.value
            editStatus.textContent = 'Saved.'
            editStatus.className = 'edit-status success'
          } catch (e) {
            editStatus.textContent = e.message
            editStatus.className = 'edit-status error'
          }
        })

        embedBtn.addEventListener('click', () => {
          detail.classList.add('open')
          embedContainer.innerHTML = ''
          embedContainer.appendChild(buildEmbedSection(sp.path))
        })

        const wrapper = document.createDocumentFragment()
        wrapper.appendChild(row)
        wrapper.appendChild(detail)
        return wrapper
      }

      // --- embed HTML generation ----------------------------------------

      function originValue() {
        return document.getElementById('origin-input').value.trim().replace(/\/$/, '')
      }

      // Percent-encodes each path segment separately (not the "/" separators),
      // since categories can contain spaces ("Short Assignment") - a raw
      // space in a URL is invalid, but naively encoding the whole relPath
      // would also mangle the "/"s.
      function urlForRelPath(origin, relPath) {
        return origin + '/' + relPath.split('/').map(encodeURIComponent).join('/')
      }

      function buildEmbedSection(relPath) {
        const origin = originValue()
        const toolUrl = `${origin}/coding-window/index.html`
        const fileUrl = urlForRelPath(origin, relPath)
        const src = `${toolUrl}?src=${fileUrl}`

        const container = document.createElement('div')
        container.className = 'embed-output'

        const iframeHtml = `<iframe\n  src="${src}"\n  allow="cross-origin-isolated"\n  width="850"\n  height="650"\n  style="border: none;">\n</iframe>`
        const linkHtml = `<a href="${src}" target="_blank" rel="noopener">Open coding exercise</a>`

        container.appendChild(embedBlock(
          'Option A — Inline (iframe)',
          'Falls back to a "type your input first" box in Canvas (Canvas doesn\'t isolate its pages).',
          iframeHtml,
        ))
        container.appendChild(embedBlock(
          'Option B — Opens in a new tab (fully interactive)',
          'A plain link. Real interactive typing, but opens outside the Canvas page.',
          linkHtml,
        ))

        const note = document.createElement('p')
        note.className = 'note'
        note.textContent = `Uses ?src= pointing at ${fileUrl} - only works once this file is committed, pushed, and deployed (./deploy-client-preview.sh).`
        container.appendChild(note)

        return container
      }

      function embedBlock(title, desc, html) {
        const block = document.createElement('div')
        const h4 = document.createElement('h4')
        h4.textContent = title
        block.appendChild(h4)
        const descEl = document.createElement('p')
        descEl.className = 'desc'
        descEl.textContent = desc
        block.appendChild(descEl)

        const copyRow = document.createElement('div')
        copyRow.className = 'copy-row'
        const label = document.createElement('label')
        label.textContent = 'Paste into Canvas (HTML editor view)'
        copyRow.appendChild(label)
        const copyBtn = document.createElement('button')
        copyBtn.className = 'copy-btn'
        copyBtn.type = 'button'
        copyBtn.textContent = 'Copy'
        copyRow.appendChild(copyBtn)
        block.appendChild(copyRow)

        const ta = document.createElement('textarea')
        ta.readOnly = true
        ta.spellcheck = false
        ta.value = html
        block.appendChild(ta)

        copyBtn.addEventListener('click', async () => {
          try {
            await navigator.clipboard.writeText(ta.value)
            copyBtn.textContent = 'Copied!'
            copyBtn.classList.add('copied')
          } catch (e) {
            ta.select()
            copyBtn.textContent = 'Select-all instead'
          }
        })

        return block
      }

      // --- create ----------------------------------------------------------

      const scopeRadios = document.querySelectorAll('input[name="scope"]')
      const categoryRow = document.getElementById('category-row')
      const categorySelect = document.getElementById('category-select')
      const categoryNewRow = document.getElementById('category-new-row')
      const categoryNewInput = document.getElementById('category-new-input')
      const nameInput = document.getElementById('name-input')
      const codeInput = document.getElementById('code-input')
      const saveBtn = document.getElementById('save-btn')
      const createStatus = document.getElementById('create-status')
      const createEmbedOutput = document.getElementById('create-embed-output')

      for (const r of scopeRadios) {
        r.addEventListener('change', () => {
          categoryRow.style.display = currentScope() === 'canvas' ? 'block' : 'none'
        })
      }

      categorySelect.addEventListener('change', () => {
        categoryNewRow.style.display = categorySelect.value === '__new__' ? 'block' : 'none'
      })

      function currentScope() {
        return document.querySelector('input[name="scope"]:checked').value
      }

      function renderCategoryOptions() {
        const categories = Array.from(new Set([...SUGGESTED_CATEGORIES, ...Object.keys(data.canvas)])).sort()
        categorySelect.innerHTML = ''
        for (const c of categories) {
          const opt = document.createElement('option')
          opt.value = c
          opt.textContent = c
          categorySelect.appendChild(opt)
        }
        const newOpt = document.createElement('option')
        newOpt.value = '__new__'
        newOpt.textContent = '+ New category...'
        categorySelect.appendChild(newOpt)
      }

      function currentCategory() {
        return categorySelect.value === '__new__' ? categoryNewInput.value.trim() : categorySelect.value
      }

      saveBtn.addEventListener('click', async () => {
        createStatus.textContent = ''
        createStatus.className = ''
        createEmbedOutput.innerHTML = ''

        const scope = currentScope()
        const name = nameInput.value.trim()
        const code = codeInput.value
        const category = scope === 'canvas' ? currentCategory() : undefined

        const existingNames = scope === 'book'
          ? data.book.map(sp => sp.name)
          : (data.canvas[category] || []).map(sp => sp.name)
        let overwrite = false
        if (existingNames.includes(name)) {
          if (!confirm(`"${name}" already exists in this location. Overwrite it?`)) return
          overwrite = true
        }

        try {
          const res = await fetch('/api/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({scope, category, name, code, overwrite}),
          })
          const json = await res.json()
          if (!res.ok) throw new Error(json.error || 'Save failed')

          createStatus.textContent = `Saved ${json.path}`
          createStatus.className = 'success'
          createEmbedOutput.appendChild(buildEmbedSection(json.path))
          if (scope === 'book') {
            const reminder = document.createElement('p')
            reminder.className = 'note'
            reminder.textContent = `Don't forget: this only creates the file. Add <cmecode startPoint="${name}"></cmecode> wherever it belongs in the book's source to actually use it.`
            createEmbedOutput.appendChild(reminder)
          }
          await loadData()
        } catch (e) {
          createStatus.textContent = e.message
          createStatus.className = 'error'
        }
      })

      // --- deep linking --------------------------------------------------

      // Open straight onto one starting point with ?file=<name> (the startPoint
      // value, no .c). Mainly for the book's web-edit preview: alt-clicking a
      // coding window there opens this tool already pointed at that exercise,
      // instead of leaving you to find it in the list by hand. Also fine to
      // bookmark. See scripts/README-editing.md in the repo root.
      function revealStartingPoint(name) {
        const inBook = data.book.some(sp => sp.name === name)
        const inCanvas = Object.values(data.canvas)
          .some(items => items.some(sp => sp.name === name))
        if (!inBook && !inCanvas) return false

        const book = inBook
        switchTab(book ? 'book' : 'canvas')

        // Filtering to the name guarantees the row is actually rendered, so
        // this works regardless of how long the list has grown.
        const filterInput = book ? bookFilterInput : canvasFilterInput
        filterInput.value = name
        if (book) renderBook()
        else renderCanvas()

        const listEl = book ? bookListEl : canvasListEl
        const row = listEl.querySelector(`[data-sp-name="${CSS.escape(name)}"]`)
        if (!row) return false

        row.querySelector('button[data-role="edit"]').click()
        row.scrollIntoView({block: 'center'})
        row.classList.add('sp-linked')

        // The filter box is now pre-filled with one name, which looks like the
        // list is broken until you notice why - so say what happened, and make
        // getting back to the full list one click rather than a puzzle.
        const note = document.createElement('p')
        note.className = 'note'
        note.textContent = `Filtered to "${name}" from a link. `
        const clear = document.createElement('button')
        clear.type = 'button'
        clear.textContent = 'Show all'
        clear.addEventListener('click', () => {
          filterInput.value = ''
          if (book) renderBook()
          else renderCanvas()
          note.remove()
        })
        note.appendChild(clear)
        listEl.parentElement.insertBefore(note, listEl)
        return true
      }

      function applyDeepLink() {
        const name = new URLSearchParams(location.search).get('file')
        if (!name) return
        if (!revealStartingPoint(name)) {
          const warning = document.createElement('p')
          warning.className = 'note'
          warning.style.color = '#a94442'
          warning.textContent =
            `No starting point named "${name}" was found in CMeCodeDir/ or ` +
            `CanvasStartDir/. It may not have been created yet.`
          document.getElementById('app').insertBefore(
            warning, document.getElementById('tabs')
          )
        }
      }

      loadData().then(applyDeepLink)
    </script>
  </body>
</html>
